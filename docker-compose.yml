version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: medbridge-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./test.db
      - JWT_SECRET_KEY=dev-secret-key
      - JWT_ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRY_MINUTES=30
      - GROQ_API_KEY=

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: medbridge-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://backend:8000
